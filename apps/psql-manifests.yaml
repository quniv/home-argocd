---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: psql-manifests
  namespace: argocd
  annotations:
    # Wave 1 ensures ExternalSecrets exist before psql (wave 2) starts,
    # giving ESO time to reconcile the secrets into the psql namespace.
    argocd.argoproj.io/sync-wave: '1'
spec:
  project: default
  source:
    repoURL: https://github.com/quniv/home-argocd.git
    targetRevision: HEAD
    path: manifests/psql
  destination:
    server: https://kubernetes.default.svc
    namespace: psql
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions: [CreateNamespace=true]
