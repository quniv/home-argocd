apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudflare-ddns
  namespace: cloudflare-ddns
spec:
  podSelector:
    matchLabels:
      app: cloudflare-ddns
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # DNS resolution (kube-dns and upstream)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Cloudflare API (api.cloudflare.com) and DNS-over-HTTPS
    - ports:
        - port: 443
          protocol: TCP
