---
# yamllint configuration for home-argocd GitOps repo.
# Kubernetes manifests routinely have long lines (image URLs, env values)
# and use bare true/false, so both rules are disabled. document-start is
# disabled because the repo follows the common convention of omitting "---"
# from single-document files.
#
# charts/*/templates/ directories are excluded: Helm Go templates ({{ }}) are
# not valid YAML and cannot be linted as-is. Values files in charts/ are plain
# YAML and are linted normally.
extends: default

ignore: |
  charts/webapp/templates
  charts/psql-init/templates

rules:
  line-length: disable
  truthy: disable
  document-start: disable
