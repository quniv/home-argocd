apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vvn-ce-postgresql
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    chart: postgresql
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: ">=16.0.0 <17.0.0"
    helm:
      releaseName: postgresql
      values: |
        auth:
          database: vocab
          username: vocab
          existingSecret: postgresql-secrets
          secretKeys:
            adminPasswordKey: password
            userPasswordKey: password
        primary:
          persistence:
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: vvn
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
