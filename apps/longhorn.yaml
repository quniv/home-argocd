---
# Prerequisites on all cluster nodes (run before ArgoCD syncs this app):
#   sudo apt install -y open-iscsi nfs-common && sudo systemctl enable --now iscsid
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  project: default
  source:
    chart: longhorn
    repoURL: https://charts.longhorn.io
    targetRevision: 1.12.0
    helm:
      releaseName: longhorn
      values: |
        defaultSettings:
          # Single replica — no HA, home lab only
          defaultReplicaCount: "1"
          storageMinimalAvailablePercentage: "10"
          # Allow volume creation even when a replica is unavailable
          allowVolumeCreationWithDegradedAvailability: "true"
        persistence:
          # Set Longhorn as the default StorageClass
          defaultClass: true
          defaultClassReplicaCount: "1"
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Longhorn CRDs exceed the kubectl annotation size limit
      - ServerSideApply=true
