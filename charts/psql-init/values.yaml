---
# Name of the k8s Secret ESO creates — also what the Job reads from
secretName: ''

# Infisical path holding the app's DB_USER/DB_PASSWORD/DB_NAME. When set, a local
# copy of these keys is synced into the release namespace via ExternalSecret so the
# Job doesn't depend on the app's own (different-namespace) ExternalSecret.
dbSecretInfisicalPath: ''

# Comma-separated namespace names or regular expressions. When set, Reflector
# automatically mirrors the ESO-managed Secret into matching namespaces.
reflectionTargetNamespaces: ''

# Admin credentials secret (created by the psql admin ExternalSecret)
adminSecretName: psql-admin
adminPasswordKey: postgres-password  # checkov:skip=CKV_SECRET_6:False positive — key name, not a secret value
pgHost: psql-postgresql.psql.svc.cluster.local
image: postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
imagePullPolicy: IfNotPresent
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi
