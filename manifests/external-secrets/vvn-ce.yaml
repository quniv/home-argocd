---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vvn-ce
  namespace: vvn-ce
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: vvn-ce
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # checkov:skip=CKV_SECRET_6:False positive — connection string template, values come from ESO-fetched vars
        # DB_USER/DB_PASSWORD are percent-encoded before insertion — Infisical values may contain
        # URI-reserved characters (e.g. @, #) that would otherwise break URL parsing.
        DATABASE_URL: |-
          {{- $u := .DB_USER | replace "%" "%25" | replace ":" "%3A" | replace "/" "%2F" | replace "?" "%3F" | replace "#" "%23" | replace "[" "%5B" | replace "]" "%5D" | replace "@" "%40" | replace " " "%20" -}}
          {{- $p := .DB_PASSWORD | replace "%" "%25" | replace ":" "%3A" | replace "/" "%2F" | replace "?" "%3F" | replace "#" "%23" | replace "[" "%5B" | replace "]" "%5D" | replace "@" "%40" | replace " " "%20" -}}
          postgresql+asyncpg://{{ $u }}:{{ $p }}@psql-postgresql.psql.svc.cluster.local:5432/{{ .DB_NAME }}
        OPENROUTER_API_KEY: '{{ .OPENROUTER_API_KEY }}'
  data:
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: /vvn-ce/OPENROUTER_API_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: DB_USER
      remoteRef:
        key: /psql/vvn-ce/DB_USER
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /psql/vvn-ce/DB_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: DB_NAME
      remoteRef:
        key: /psql/vvn-ce/DB_NAME
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
