---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: psql-backup-s3
  namespace: psql
  annotations:
    argocd.argoproj.io/sync-wave: '-1'
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: psql-backup-s3
    creationPolicy: Owner
  data:
    # Reuses the Velero IAM user — its policy covers the whole bucket,
    # pg_dump objects go under the psql/ prefix
    - secretKey: AWS_ACCESS_KEY_ID  # checkov:skip=CKV_SECRET_6:False positive — Infisical path reference, not an encoded value
      remoteRef:
        key: /velero/AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY  # checkov:skip=CKV_SECRET_6:False positive — Infisical path reference, not an encoded value
      remoteRef:
        key: /velero/AWS_SECRET_ACCESS_KEY
    - secretKey: S3_BUCKET  # checkov:skip=CKV_SECRET_6:False positive — Infisical path reference, not an encoded value
      remoteRef:
        key: /velero/S3_BUCKET
