---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: multica-http-redirect
  namespace: multica
spec:
  parentRefs:
    - name: external
      namespace: infra
      sectionName: http
  hostnames: [multica.qtlab.dev, api.multica.qtlab.dev]
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
