---
# Read-only identity for external operational observation. This account is
# intentionally unable to read Secrets, exec into Pods, or mutate resources.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-kubeconfig
  namespace: infra
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-kubeconfig-observer
rules:
  - apiGroups: ['']
    resources:
      - namespaces
      - nodes
      - pods
      - services
      - endpoints
      - events
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, replicasets, statefulsets, daemonsets]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  - apiGroups: [discovery.k8s.io]
    resources: [endpointslices]
    verbs: [get, list, watch]
  - apiGroups: [gateway.networking.k8s.io]
    resources:
      - gateways
      - httproutes
      - grpcroutes
      - tcproutes
      - tlsroutes
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-kubeconfig-observer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-kubeconfig-observer
subjects:
  - kind: ServiceAccount
    name: agent-kubeconfig
    namespace: infra
