---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docmost-creds
  namespace: docmost
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: docmost-creds
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: APP_SECRET  # checkov:skip=CKV_SECRET_6:False positive — Infisical path reference, not an encoded secret value
      remoteRef:
        key: /docmost/APP_SECRET
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
apiVersion: external-secrets.io/v1
