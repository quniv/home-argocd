  target:
    name: docmost-redis-auth
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: redis-password  # checkov:skip=CKV_SECRET_6:False positive — Infisical path reference, not an encoded secret value
      remoteRef:
        key: /docmost/REDIS_PASSWORD
