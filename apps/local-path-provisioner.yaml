---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-path-provisioner
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  project: default
  source:
    chart: local-path-provisioner
    repoURL: https://charts.containeroo.ch
    targetRevision: 0.0.37
    helm:
      releaseName: local-path-provisioner
      values: |
        storageClass:
          # Set as the default StorageClass for all PVCs
          defaultClass: true
          # Retain keeps the PV when a PVC is deleted — safer for future Velero restores
          reclaimPolicy: Retain
  destination:
    server: https://kubernetes.default.svc
    namespace: local-path-storage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions: [CreateNamespace=true]
