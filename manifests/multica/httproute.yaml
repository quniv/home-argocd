---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: multica
  namespace: multica
spec:
  parentRefs:
    - name: external
      namespace: infra
      sectionName: http
  hostnames: [multica.qtlab.dev, multica-api.qtlab.dev]
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
