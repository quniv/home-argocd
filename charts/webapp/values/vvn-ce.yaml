nameOverride: vvn-backend

image:
  repository: ghcr.io/quniv/vvn-ce/backend
  tag: latest

migration:
  enabled: true

service:
  port: 8000
  targetPort: 8000

probes:
  readiness:
    httpPath: /api/health
    port: 8000

envFrom:
  - configMapRef:
      name: vvn-backend-config
  - secretRef:
      name: vvn-backend-secrets

configmap:
  enabled: true
  data:
    REDIS_URL: redis://redis-master:6379/0
    OPENROUTER_MODEL: z-ai/glm-4.5-air:free
    OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
    DEBUG: "false"
    CORS_ORIGINS: '["*"]'
    USE_LLM_FALLBACK: "false"
    CACHE_TTL_SECONDS: "2592000"

httproute:
  enabled: true
  hostname: vvn.chillpickle.org

externalsecret:
  enabled: true
  targetSecret: vvn-backend-secrets
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: /vvn-ce/DATABASE_URL
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: /vvn-ce/OPENROUTER_API_KEY

namespace: vvn
