---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: multica
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '2'
spec:
  project: default
  sources:
    - repoURL: ghcr.io/quniv/charts
      chart: multica
      # Watch releases at https://github.com/quniv/multica/releases;
      # chart targetRevision updates are not covered by the current Dependabot config.
      targetRevision: 0.3.44
      helm:
        releaseName: multica
        values: |
          existingSecret: multica-secrets
          images:
            backend:
              tag: v0.3.43
            frontend:
              tag: v0.3.43
          postgres:
            external:
              enabled: true
          backend:
            config:
              appUrl: https://multica.qtlab.dev
              frontendOrigin: https://multica.qtlab.dev
              corsAllowedOrigins: https://multica.qtlab.dev
              googleRedirectUri: https://multica.qtlab.dev/auth/callback
              localUploadBaseUrl: https://multica-api.qtlab.dev
          ingress:
            enabled: false
          gatewayAPI:
            enabled: true
            parentRefs:
              - name: external
                namespace: infra
                sectionName: https
            frontend:
              hostnames: [multica.qtlab.dev]
            backend:
              hostnames: [multica-api.qtlab.dev]
    - repoURL: https://github.com/quniv/home-argocd.git
      targetRevision: HEAD
      path: manifests/multica
  destination:
    server: https://kubernetes.default.svc
    namespace: multica
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions: [CreateNamespace=true]
