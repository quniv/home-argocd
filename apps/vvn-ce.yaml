---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vvn-ce
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '2'
spec:
  project: default
  sources:
    - repoURL: oci://ghcr.io/quniv/charts
      chart: vvn-ce
      targetRevision: 0.0.0
      helm:
        releaseName: vvn-ce
        values: |
          secret:
            create: false
            existingSecret: vvn-ce
          backend:
            enabled: true
            httpRoute:
              enabled: true
              parentRefs:
                - name: external
                  namespace: infra
                  sectionName: https
              hostnames:
                - vocab.qtlab.dev
          crawler:
            enabled: false
    - repoURL: https://github.com/quniv/home-argocd.git
      targetRevision: HEAD
      path: charts/psql-init
      helm:
        releaseName: vvn-ce
        valueFiles:
          - values/vvn-ce.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: vvn-ce
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions: [CreateNamespace=true]
