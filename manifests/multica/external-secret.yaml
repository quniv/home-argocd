---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: multica-secrets
  namespace: multica
  annotations:
    argocd.argoproj.io/sync-wave: '-1'
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: multica-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        # checkov:skip=CKV_SECRET_6:Values are composed from ESO-fetched variables
        DATABASE_URL: |-
          {{- $u := .DB_USER | replace "%" "%25" | replace ":" "%3A" | replace "/" "%2F" | replace "?" "%3F" | replace "#" "%23" | replace "[" "%5B" | replace "]" "%5D" | replace "@" "%40" | replace " " "%20" -}}
          {{- $p := .DB_PASSWORD | replace "%" "%25" | replace ":" "%3A" | replace "/" "%2F" | replace "?" "%3F" | replace "#" "%23" | replace "[" "%5B" | replace "]" "%5D" | replace "@" "%40" | replace " " "%20" -}}
          postgres://{{ $u }}:{{ $p }}@psql-postgresql.psql.svc.cluster.local:5432/{{ .DB_NAME }}?sslmode=disable
        JWT_SECRET: '{{ .JWT_SECRET }}'
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: /multica/JWT_SECRET
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: DB_USER
      remoteRef:
        key: /psql/multica/DB_USER
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /psql/multica/DB_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: DB_NAME
      remoteRef:
        key: /psql/multica/DB_NAME
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
