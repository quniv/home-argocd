---
# Infisical paths required (project: home-kubernetes, env: prod):
#   /monitoring/TELEGRAM_BOT_TOKEN  — bot token from @BotFather
#   /monitoring/TELEGRAM_CHAT_ID    — integer chat/group/channel ID (e.g. -1001234567890)
#
# Get your chat ID via @userinfobot or @raw_data_bot in Telegram.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: '-1'
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: alertmanager-config
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          route:
            group_by:
              - alertname
              - namespace
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            receiver: 'null'
            routes:
              - receiver: telegram
                matchers:
                  - alertname != Watchdog
                  - severity =~ "warning|critical"
                continue: false
          inhibit_rules:
            - source_matchers:
                - severity = critical
              target_matchers:
                - severity =~ "warning|info"
              equal:
                - namespace
                - alertname
            - source_matchers:
                - severity = warning
              target_matchers:
                - severity = info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - alertname = InfoInhibitor
              target_matchers:
                - severity = info
              equal:
                - namespace
          receivers:
            - name: 'null'
            - name: telegram
              telegram_configs:
                - api_url: https://api.telegram.org
                  bot_token: "{{ .botToken }}"  # checkov:skip=CKV_SECRET_6:ESO template variable
                  chat_id: {{ .chatId }}
                  disable_notifications: false
  data:
    - secretKey: botToken  # checkov:skip=CKV_SECRET_6:False positive — Infisical path reference
      remoteRef:
        key: /monitoring/TELEGRAM_BOT_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: chatId  # checkov:skip=CKV_SECRET_6:False positive — Infisical path reference
      remoteRef:
        key: /monitoring/TELEGRAM_CHAT_ID
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
