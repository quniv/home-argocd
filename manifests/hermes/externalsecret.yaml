---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-credentials
  namespace: hermes
  annotations:
    argocd.argoproj.io/sync-wave: '-1'
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: hermes-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: /hermes
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
