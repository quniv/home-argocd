---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docmost-credentials
  namespace: docmost
  annotations:
    argocd.argoproj.io/sync-wave: '-1'
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: docmost-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: APP_SECRET  # checkov:skip=CKV_SECRET_6:False positive — Infisical path reference, not an encoded secret value
      remoteRef:
        key: /docmost/APP_SECRET
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docmost-postgresql-auth
  namespace: docmost
  annotations:
    argocd.argoproj.io/sync-wave: '-1'
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: docmost-postgresql-auth
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: user-password  # checkov:skip=CKV_SECRET_6:False positive — Infisical path reference, not an encoded secret value
      remoteRef:
        key: /docmost/POSTGRES_PASSWORD
    - secretKey: postgres-password  # checkov:skip=CKV_SECRET_6:False positive — Infisical path reference, not an encoded secret value
      remoteRef:
        key: /docmost/POSTGRES_ADMIN_PASSWORD
---
apiVersion: external-secrets.io/v1
