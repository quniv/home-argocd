---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  annotations:
    # CKV_K8S_40 — runAsUser > 10000: the image explicitly sets USER root (Dockerfile
    # layer 34) so that s6-overlay can act as PID 1 and manage child processes and
    # signals. The container runs as UID 0 throughout its lifecycle.
    checkov.io/skip1: CKV_K8S_40=image-sets-user-root-for-s6-overlay-pid1

    # CKV_K8S_23 — runAsNonRoot: same constraint as CKV_K8S_40. The image sets
    # USER root explicitly; there is no upstream mechanism to drop privileges without
    # rebuilding the image with a different init system.
    checkov.io/skip2: CKV_K8S_23=image-sets-user-root-no-upstream-drop

    # CKV_K8S_35 — prefer secrets as files over env vars: Hermes reads API keys and
    # dashboard credentials from environment variables (either injected env or its
    # /opt/data/.env file). The application does not support reading secrets from
    # mounted files; env var injection is the only supported mechanism.
    checkov.io/skip3: CKV_K8S_35=hermes-only-supports-env-var-secrets

    # CKV2_K8S_6 — NetworkPolicy: home-lab cluster has no NetworkPolicy enforcement
    # (Cilium is configured in allow-all mode for simplicity). Adding a NetworkPolicy
    # object would be silently ignored and give a false sense of isolation.
    checkov.io/skip4: CKV2_K8S_6=no-netpol-enforcement-in-home-lab
spec:
  replicas: 1
  # Recreate is required — Hermes has a non-concurrent write design; two pods
  # against the same PVC will corrupt state.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hermes
          image: nousresearch/hermes-agent@sha256:132e6ca17b1229ce316fd4f43a99aae6e866807dca9c0be11e9d21ae9fb51ebf
          imagePullPolicy: IfNotPresent
          args: [gateway, run]
          ports:
            - name: api
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          env:
            - name: HERMES_DASHBOARD
              value: '1'
          envFrom:
            - secretRef:
                name: hermes-credentials
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: dshm
              mountPath: /dev/shm
            - name: run
              mountPath: /run
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: '2'
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
