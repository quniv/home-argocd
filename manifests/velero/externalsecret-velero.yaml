---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-credentials
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: '-1'
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: velero-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      data:
        # Velero AWS plugin expects the credentials file under key 'cloud'
        cloud: |
          [default]
          aws_access_key_id={{ .aws_access_key_id }}
          aws_secret_access_key={{ .aws_secret_access_key }}
  data:
    - secretKey: aws_access_key_id  # checkov:skip=CKV_SECRET_6:False positive — Infisical path reference, not an encoded value
      remoteRef:
        key: /velero/AWS_ACCESS_KEY_ID
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: aws_secret_access_key  # checkov:skip=CKV_SECRET_6:False positive — Infisical path reference, not an encoded value
      remoteRef:
        key: /velero/AWS_SECRET_ACCESS_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
