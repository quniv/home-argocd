---
# kube-linter configuration for home-argocd GitOps repo.
# All built-in checks are enabled. Only sorted-keys is excluded — it enforces
# alphabetical YAML key ordering which conflicts with conventional Kubernetes
# field order (apiVersion/kind/metadata/spec) and is a style preference, not
# a security or reliability rule.
checks:
  addAllBuiltIn: true
  exclude:
    # Alphabetical key ordering conflicts with conventional Kubernetes YAML
    # ordering (e.g. it would require data before kind in a ConfigMap).
    - sorted-keys
