---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "psql-init.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "psql-init.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    checkov.io/skip1: CKV_K8S_35=psql-CLI-requires-env-vars
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminSecretName }}
                  key: {{ .Values.adminPasswordKey }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: DB_NAME
          command:
            - /bin/sh
            - -c
            - |
              set -e
              HOST={{ .Values.pgHost }}
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h "$HOST" -U postgres; do sleep 3; done
              echo "Creating user and database..."
              psql -h "$HOST" -U postgres <<SQL
                DO \$\$
                BEGIN
                  IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '${DB_USER}') THEN
                    EXECUTE format('CREATE USER %I WITH PASSWORD %L', '${DB_USER}', '${DB_PASSWORD}');
                    RAISE NOTICE 'User % created.', '${DB_USER}';
                  ELSE
                    RAISE NOTICE 'User % already exists, skipping.', '${DB_USER}';
                  END IF;
                END
                \$\$;
                SELECT format('CREATE DATABASE %I OWNER %I', '${DB_NAME}', '${DB_USER}')
                  WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '${DB_NAME}')\gexec
              SQL
              echo "Creating schema..."
              psql -h "$HOST" -U postgres -d "$DB_NAME" <<SQL
                CREATE SCHEMA IF NOT EXISTS "${DB_USER}" AUTHORIZATION "${DB_USER}";
                ALTER ROLE "${DB_USER}" SET search_path = "${DB_USER}";
                REVOKE ALL ON SCHEMA public FROM PUBLIC;
              SQL
              echo "Done."
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
