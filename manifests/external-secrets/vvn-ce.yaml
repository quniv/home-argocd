---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vvn-ce
  namespace: vvn-ce
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: vvn-ce
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: /vvn-ce/DATABASE_URL
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: /vvn-ce/OPENROUTER_API_KEY
