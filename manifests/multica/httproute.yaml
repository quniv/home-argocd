---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: multica-http-redirect
  namespace: multica
spec:
  parentRefs:
    - name: external
      namespace: infra
      sectionName: http
  hostnames: [multica.qtlab.dev, api.multica.qtlab.dev]
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: multica-frontend
  namespace: multica
spec:
  parentRefs:
    - name: external
      namespace: infra
      sectionName: https
  hostnames: [multica.qtlab.dev]
  rules:
    - backendRefs:
        - name: multica-frontend
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: multica-backend
  namespace: multica
spec:
  parentRefs:
    - name: external
      namespace: infra
      sectionName: https
  hostnames: [api.multica.qtlab.dev]
  rules:
    - backendRefs:
        - name: multica-backend
          port: 8080
