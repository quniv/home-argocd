---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  project: default
  sources:
    - chart: velero
      repoURL: https://vmware-tanzu.github.io/helm-charts
      targetRevision: 12.0.2
      helm:
        releaseName: velero
        values: |
          image:
            repository: docker.io/velero/velero
            tag: v1.18.1
          initContainers:
            - name: velero-plugin-for-aws
              image: velero/velero-plugin-for-aws:v1.13.1
              imagePullPolicy: IfNotPresent
              volumeMounts:
                - mountPath: /target
                  name: plugins
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          credentials:
            existingSecret: velero-creds

          # Node-agent DaemonSet required for Kopia file-system volume backup
          deployNodeAgent: true
          nodeAgent:
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 1Gi

          # local-path-provisioner has no CSI snapshot driver
          snapshotsEnabled: false
          configuration:
            uploaderType: kopia
            backupStorageLocation:
              - name: default
                provider: aws
                bucket: lacia-cluster-velero-backups
                default: true
                credential:
                  name: velero-creds
                  key: cloud
                config:
                  region: ap-southeast-1
            # PV backup is opt-in globally; schedules below enable it for psql only
            defaultVolumesToFsBackup: false
          schedules:
            psql-daily:
              schedule: "0 0 * * *"
              template:
                includedNamespaces:
                  - psql
                defaultVolumesToFsBackup: true
                storageLocation: default
                ttl: 336h0m0s  # 14 days
            psql-weekly:
              schedule: "0 0 * * 0"
              template:
                includedNamespaces:
                  - psql
                defaultVolumesToFsBackup: true
                storageLocation: default
                ttl: 1344h0m0s  # 8 weeks
    - repoURL: https://github.com/quniv/home-argocd.git
      targetRevision: HEAD
      path: manifests/velero
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
