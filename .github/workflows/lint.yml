---
# Lint workflow — validates all YAML and Kubernetes manifests.
#
# Jobs:
#   yamllint        — checks syntax/style of manifests/ and apps/ against
#                     .yamllint.yml; on PRs, runs yamlfix first and if any
#                     files were changed, opens an auto-fix PR targeting the
#                     feature branch (merge it to unblock CI on the original PR).
#   kubeconform     — validates manifests against the Kubernetes 1.28 schema;
#                     unknown CRD kinds (ArgoCD, Gateway API, ESO, Cilium) are
#                     resolved via the CRDs-catalog; anything still unknown is
#                     skipped with --ignore-missing-schemas rather than failing.
#
# bootstrap/ and charts/psql-init/values.yaml are linted alongside manifests/ and apps/.
# charts/webapp/templates/ is excluded from yamllint (Helm Go templates are not
# valid YAML) and from kubeconform (templates are not rendered k8s manifests).
name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Deny all permissions by default; each job grants only what it needs.
permissions: read-all

jobs:
  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Fetch the actual branch ref so auto-fix branch can be created
          # from the correct base; pull_request events check out a merge
          # commit by default.
          ref: ${{ github.head_ref || github.ref }}

      - name: Install yamllint and yamlfix
        run: pip install yamllint yamlfix

      - name: Auto-fix YAML style issues (PRs only)
        # Runs yamlfix in the workspace so that:
        #   1. The fix PR is created with the correct diff.
        #   2. The yamllint step below runs on the fixed files and passes.
        if: github.event_name == 'pull_request'
        run: yamlfix manifests/ apps/ bootstrap/ charts/psql-init/values.yaml

      - name: Open fix PR if YAML was changed (PRs only)
        # If yamlfix modified any files, create-pull-request opens a new PR
        # targeting the feature branch. The developer merges it; that merge
        # triggers a new CI run on the feature branch which then passes.
        # If no files changed, pull-request-operation == 'none' and the step
        # is a no-op.
        id: fix-pr
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "style: auto-fix YAML style issues via yamlfix"
          title: "style: fix YAML style in ${{ github.head_ref }}"
          body: |
            YAML style issues were detected in #${{ github.event.pull_request.number }}.

            Merge this PR into `${{ github.head_ref }}` to unblock CI on the original PR.
          branch: auto-fix/yamlfix-${{ github.head_ref }}
          base: ${{ github.head_ref }}
          delete-branch: true

      - name: Run yamllint
        # .yamllint.yml ignores charts/webapp/templates (Helm Go templates).
        # On PRs this runs on the yamlfix-fixed working copy, so it passes
        # even when the original commit had style issues.
        run: yamllint -c .yamllint.yml manifests/ apps/ bootstrap/ charts/

      - name: Fail if auto-fix PR was opened (PRs only)
        # Keeps CI red on the original PR until the developer merges the fix
        # PR. Once merged, a new CI run fires on the feature branch and passes.
        if: >-
          github.event_name == 'pull_request' &&
          steps.fix-pr.outputs.pull-request-operation != 'none' &&
          steps.fix-pr.outputs.pull-request-operation != '' &&
          steps.fix-pr.outputs.pull-request-operation != 'closed'
        run: |
          echo "::error::YAML style issues found. Merge the auto-fix PR to unblock: ${{ steps.fix-pr.outputs.pull-request-url }}"
          exit 1

  kubeconform:
    name: Kubeconform manifest validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install kubeconform
        # Fetches the latest release binary directly from GitHub; no
        # third-party action required and no pinned version to keep stale.
        # GITHUB_TOKEN authenticates the releases API to avoid rate-limit failures.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KUBECONFORM_VERSION=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/yannh/kubeconform/releases/latest \
            | grep '"tag_name"' | sed -E 's/.*"v([^"]+)".*/\1/')
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz kubeconform
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Validate Kubernetes manifests
        # bootstrap/ is included — it contains real k8s resources.
        # charts/ is excluded — Helm templates are not rendered k8s manifests.
        # Helm values files (values.ya?ml) and JSON config files are excluded
        # because they are not k8s manifests and have no 'kind' key.
        run: |
          kubeconform \
            -ignore-missing-schemas \
            -kubernetes-version 1.36.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -ignore-filename-pattern 'values\.ya?ml$' \
            -ignore-filename-pattern '\.json$' \
            -ignore-filename-pattern '^bootstrap/' \
            -summary \
            manifests/ apps/ bootstrap/
