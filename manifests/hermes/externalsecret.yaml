---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-credentials
  namespace: hermes
  annotations:
    argocd.argoproj.io/sync-wave: '-1'
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: hermes-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: HERMES_DASHBOARD_BASIC_AUTH_USERNAME  # checkov:skip=CKV_SECRET_6:False positive — this is an Infisical path reference, not an encoded secret value
      remoteRef:
        key: /hermes/HERMES_DASHBOARD_BASIC_AUTH_USERNAME
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD  # checkov:skip=CKV_SECRET_6:False positive — this is an Infisical path reference, not an encoded secret value
      remoteRef:
        key: /hermes/HERMES_DASHBOARD_BASIC_AUTH_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
