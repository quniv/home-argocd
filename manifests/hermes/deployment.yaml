---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  annotations:
    # CKV_K8S_40 — runAsUser > 10000: the image explicitly sets USER root (Dockerfile
    # layer 34) so that s6-overlay can act as PID 1 and manage child processes and
    # signals. The container runs as UID 0 throughout its lifecycle.
    checkov.io/skip1: CKV_K8S_40=image-sets-user-root-for-s6-overlay-pid1

    # CKV_K8S_23 — runAsNonRoot: same constraint as CKV_K8S_40. The image sets
    # USER root explicitly; there is no upstream mechanism to drop privileges without
    # rebuilding the image with a different init system.
    checkov.io/skip2: CKV_K8S_23=image-sets-user-root-no-upstream-drop

    # CKV_K8S_35 — prefer secrets as files over env vars: Hermes reads API keys and
    # dashboard credentials from environment variables (either injected env or its
    # /opt/data/.env file). The application does not support reading secrets from
    # mounted files; env var injection is the only supported mechanism.
    checkov.io/skip3: CKV_K8S_35=hermes-only-supports-env-var-secrets

    # CKV2_K8S_6 — NetworkPolicy: home-lab cluster has no NetworkPolicy enforcement
    # (Cilium is configured in allow-all mode for simplicity). Adding a NetworkPolicy
    # object would be silently ignored and give a false sense of isolation.
    checkov.io/skip4: CKV2_K8S_6=no-netpol-enforcement-in-home-lab

    # CKV_K8S_22 — readOnlyRootFilesystem: s6-overlay writes runtime state to /run at
    # startup (s6-rc dirs, supervise fifos, service symlinks). A read-only root FS
    # requires an emptyDir overlay at /run, but that emptyDir hides the image's own
    # /run/service directory (which has the correct permissions for the hermes user).
    # Removing readOnlyRootFilesystem lets s6-overlay use the image's writable layer
    # for /run directly — matching how docker-compose runs this image.
    checkov.io/skip6: CKV_K8S_22=s6-overlay-needs-writable-run-emptydir-overlay-breaks-perms
spec:
  # TEMPORARY: scaled to 0 — restore to 1 to bring hermes back up.
  replicas: 1
  # Recreate is required — Hermes has a non-concurrent write design; two pods
  # against the same PVC will corrupt state.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 10000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: install-multica
          image: nousresearch/hermes-agent@sha256:132e6ca17b1229ce316fd4f43a99aae6e866807dca9c0be11e9d21ae9fb51ebf
          imagePullPolicy: IfNotPresent
          command: [/bin/sh, -c]
          args:
            - |
              set -eu
              archive=/opt/multica-bin/multica.tar.gz
              curl -fsSL --retry 3 \
                -o "$archive" \
                https://github.com/multica-ai/multica/releases/download/v0.4.0/multica-cli-0.4.0-linux-amd64.tar.gz
              echo '40a3d84f7e656da836cd3d04df2df8dbf06a83b28fab135838fc66c406cba492  /opt/multica-bin/multica.tar.gz' \
                | sha256sum -c -
              tar -xzf "$archive" -C /opt/multica-bin multica
              rm "$archive"
              chmod 0755 /opt/multica-bin/multica
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: multica-bin
              mountPath: /opt/multica-bin
      containers:
        - name: hermes
          image: nousresearch/hermes-agent@sha256:132e6ca17b1229ce316fd4f43a99aae6e866807dca9c0be11e9d21ae9fb51ebf
          imagePullPolicy: IfNotPresent
          args: [gateway, run, --replace]
          ports:
            - name: api
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          env:
            - name: HERMES_DASHBOARD
              value: '1'
          envFrom:
            - secretRef:
                name: hermes-creds
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: '2'
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 15
            periodSeconds: 10
        - name: multica-daemon
          image: nousresearch/hermes-agent@sha256:132e6ca17b1229ce316fd4f43a99aae6e866807dca9c0be11e9d21ae9fb51ebf
          imagePullPolicy: IfNotPresent
          command: [/bin/sh, -c]
          args:
            - |
              set -eu
              mkdir -p "$HOME/.multica" "$MULTICA_WORKSPACES_ROOT"
              multica config set server_url "$MULTICA_SERVER_URL"
              multica config set app_url "$MULTICA_APP_URL"
              multica login --token "$MULTICA_TOKEN"
              exec multica daemon start --foreground --no-auto-update
          env:
            - name: HOME
              value: /opt/data/home
            - name: PATH
              value: /opt/multica-bin:/opt/hermes/bin:/opt/hermes/.venv/bin:/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: MULTICA_SERVER_URL
              value: https://api.multica.qtlab.dev
            - name: MULTICA_APP_URL
              value: https://multica.qtlab.dev
            - name: MULTICA_WORKSPACES_ROOT
              value: /opt/data/multica_workspaces
            - name: MULTICA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: multica-daemon-creds
                  key: MULTICA_TOKEN
          securityContext:
            runAsNonRoot: true
            runAsUser: 10000
            runAsGroup: 10000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: multica-bin
              mountPath: /opt/multica-bin
              readOnly: true
            - name: multica-tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: multica-bin
          emptyDir: {}
        - name: multica-tmp
          emptyDir:
            sizeLimit: 1Gi
