---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  annotations:
    # CKV_K8S_22 — readOnlyRootFilesystem: s6-overlay (the PID1 process supervisor
    # bundled in the Hermes image) writes socket files and state to /run and /var/run
    # at startup. A read-only root filesystem prevents the supervisor from starting,
    # which breaks the entire container.
    checkov.io/skip1: CKV_K8S_22=s6-overlay-writes-to-run-at-startup

    # CKV_K8S_40 — runAsUser > 10000: s6-overlay must run as UID 0 (root) because it
    # acts as PID 1 and needs to fork/exec child processes and manage their signals.
    # The Hermes process itself runs as a non-root user after s6 hands off.
    checkov.io/skip2: CKV_K8S_40=s6-overlay-pid1-requires-root-uid

    # CKV_K8S_23 — runAsNonRoot: same constraint as CKV_K8S_40. The container entry
    # point is s6-overlay which requires UID 0; dropping to non-root is not possible
    # without replacing the init system.
    checkov.io/skip3: CKV_K8S_23=s6-overlay-pid1-requires-root

    # CKV_K8S_35 — prefer secrets as files over env vars: Hermes reads API keys and
    # dashboard credentials from environment variables (either injected env or its
    # /opt/data/.env file). The application does not support reading secrets from
    # mounted files; env var injection is the only supported mechanism.
    checkov.io/skip4: CKV_K8S_35=hermes-only-supports-env-var-secrets

    # CKV2_K8S_6 — NetworkPolicy: home-lab cluster has no NetworkPolicy enforcement
    # (Cilium is configured in allow-all mode for simplicity). Adding a NetworkPolicy
    # object would be silently ignored and give a false sense of isolation.
    checkov.io/skip5: CKV2_K8S_6=no-netpol-enforcement-in-home-lab
spec:
  replicas: 1
  # Recreate is required — Hermes has a non-concurrent write design; two pods
  # against the same PVC will corrupt state.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hermes
          image: nousresearch/hermes-agent@sha256:132e6ca17b1229ce316fd4f43a99aae6e866807dca9c0be11e9d21ae9fb51ebf
          imagePullPolicy: IfNotPresent
          command: [gateway, run]
          ports:
            - name: api
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          env:
            - name: HERMES_DASHBOARD
              value: '1'
          envFrom:
            - secretRef:
                name: hermes-credentials
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: '2'
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
