---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: psql-backup
  namespace: psql
  annotations:
    checkov.io/skip1: CKV_K8S_35=pg_dump-and-aws-cli-require-env-vars
spec:
  schedule: 0 19 * * *  # 02:00 Asia/Ho_Chi_Minh (UTC+7)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: dump
              image: postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
              imagePullPolicy: IfNotPresent
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: psql-admin-credentials
                      key: postgres-password
                - name: DB_NAME
                  valueFrom:
                    secretKeyRef:
                      name: psql-vvn-ce-credentials
                      key: DB_NAME
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  HOST=psql-postgresql.psql.svc.cluster.local
                  STAMP=$(date -u +%Y%m%d-%H%M%S)
                  echo "Dumping ${DB_NAME}..."
                  pg_dump -Fc -h "$HOST" -U postgres -d "$DB_NAME" \
                    -f "/backup/${DB_NAME}-${STAMP}.dump"
                  ls -lh /backup/
              volumeMounts:
                - name: backup
                  mountPath: /backup
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65532
          containers:
            - name: upload
              image: amazon/aws-cli:2.35.3@sha256:6b27a3edde2d59dd755a920df0849ca432e5323e2a992421d40eedf78d07da54
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: psql-backup-s3
              env:
                - name: AWS_DEFAULT_REGION
                  value: ap-southeast-1
                # aws-cli writes config/cache under $HOME — point it at the writable tmp mount
                - name: HOME
                  value: /tmp
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Uploading to s3://${S3_BUCKET}/psql/ ..."
                  aws s3 cp /backup/ "s3://${S3_BUCKET}/psql/" \
                    --recursive --no-progress
                  echo "Done."
              volumeMounts:
                - name: backup
                  mountPath: /backup
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65532
          volumes:
            - name: backup
              emptyDir:
                sizeLimit: 2Gi
            - name: tmp
              emptyDir:
                sizeLimit: 64Mi
