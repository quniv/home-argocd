{{- if .Values.dbSecretInfisicalPath }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "psql-init.labels" . | nindent 4 }}
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: {{ .Values.secretName }}
    creationPolicy: Owner
  dataFrom:
    - find:
        conversionStrategy: Default
        decodingStrategy: None
        nullBytePolicy: Ignore
        path: {{ .Values.dbSecretInfisicalPath }}
        name:
          regexp: .*
{{- end }}
