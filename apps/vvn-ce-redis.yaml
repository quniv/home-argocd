apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vvn-ce-redis
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    chart: redis
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: ">=19.0.0 <21.0.0"
    helm:
      releaseName: redis
      values: |
        architecture: standalone
        auth:
          enabled: false
        master:
          persistence:
            size: 1Gi
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: vvn
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
