---
# ns
apiVersion: v1
kind: Namespace
metadata:
  name: infra
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-tls
  namespace: infra
spec:
  secretName: wildcard-tls
  usages: [digital signature, key encipherment]
  dnsNames: ['*.qtlab.dev', 'qtlab.dev']
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external
  namespace: infra
spec:
  gatewayClassName: cilium
  addresses:
    - type: IPAddress
      value: 192.168.121.121
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: '*.qtlab.dev'
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: '*.qtlab.dev'
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: http-apex
      protocol: HTTP
      port: 80
      hostname: qtlab.dev
      allowedRoutes:
        namespaces:
          from: All
    - name: https-apex
      protocol: HTTPS
      port: 443
      hostname: qtlab.dev
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
