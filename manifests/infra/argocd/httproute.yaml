---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: external
      namespace: infra
      sectionName: https
  hostnames: [argocd.chillpickle.org]
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
