---
apiVersion: batch/v1
kind: Job
metadata:
  name: psql-init-vvn-ce
  namespace: psql
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: postgres:17-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: psql-admin-credentials
                  key: postgres-password
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: psql-vvn-ce-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: psql-vvn-ce-credentials
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: psql-vvn-ce-credentials
                  key: DB_NAME
          command:
            - /bin/sh
            - -c
            - |
              set -e
              HOST=psql-postgresql.psql.svc.cluster.local

              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h "$HOST" -U postgres; do sleep 3; done

              echo "Creating user and database..."
              psql -h "$HOST" -U postgres <<SQL
                DO \$\$
                BEGIN
                  IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '${DB_USER}') THEN
                    EXECUTE format('CREATE USER %I WITH PASSWORD %L', '${DB_USER}', '${DB_PASSWORD}');
                    RAISE NOTICE 'User % created.', '${DB_USER}';
                  ELSE
                    RAISE NOTICE 'User % already exists, skipping.', '${DB_USER}';
                  END IF;
                END
                \$\$;

                SELECT format('CREATE DATABASE %I OWNER %I', '${DB_NAME}', '${DB_USER}')
                  WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '${DB_NAME}')\gexec
              SQL

              echo "Creating schema..."
              psql -h "$HOST" -U postgres -d "$DB_NAME" <<SQL
                CREATE SCHEMA IF NOT EXISTS "${DB_USER}" AUTHORIZATION "${DB_USER}";
                ALTER ROLE "${DB_USER}" SET search_path = "${DB_USER}";
                REVOKE ALL ON SCHEMA public FROM PUBLIC;
              SQL

              echo "Done."
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 70
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
