---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docmost-credentials
  namespace: docmost
  annotations:
    argocd.argoproj.io/sync-wave: '-1'
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: docmost-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: APP_SECRET  # checkov:skip=CKV_SECRET_6:False positive — this is an Infisical path reference, not an encoded secret value
      remoteRef:
        key: /docmost/APP_SECRET
