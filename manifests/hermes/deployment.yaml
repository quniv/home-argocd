---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  annotations:
    checkov.io/skip1: CKV_K8S_43=image-digest-user-must-pin-before-production
    checkov.io/skip2: CKV_K8S_22=s6-overlay-supervisor-writes-to-fs-at-runtime
    checkov.io/skip3: CKV_K8S_40=s6-overlay-runs-as-root-as-pid1-supervisor
    checkov.io/skip4: CKV_K8S_23=s6-overlay-requires-root-as-pid1
    checkov.io/skip5: CKV_K8S_35=hermes-requires-env-vars-for-api-keys
    checkov.io/skip6: CKV2_K8S_6=no-network-policy-single-pod-home-cluster
    checkov.io/skip7: CKV_K8S_14=image-tag-user-must-pin-to-digest-before-production
spec:
  replicas: 1
  # Recreate is required — Hermes has a non-concurrent write design; two pods
  # against the same PVC will corrupt state.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hermes
          # TODO: pin to a specific digest before production:
          #   docker pull nousresearch/hermes-agent:latest
          #   docker inspect --format='{{index .RepoDigests 0}}' nousresearch/hermes-agent:latest
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: Always
          command: [gateway, run]
          ports:
            - name: api
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          env:
            - name: HERMES_DASHBOARD
              value: '1'
          envFrom:
            - secretRef:
                name: hermes-credentials
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: '2'
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
