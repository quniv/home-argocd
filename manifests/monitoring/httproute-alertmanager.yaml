---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  parentRefs:
    - name: external
      namespace: infra
      sectionName: https
  hostnames: [alertmanager.chillpickle.org]
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-alertmanager
          port: 9093
