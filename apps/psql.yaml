---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: psql
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '2'
spec:
  project: default
  source:
    chart: postgresql
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 18.7.2
    helm:
      releaseName: psql
      values: |
        auth:
          # Secret managed by ESO — see manifests/psql/admin-externalsecret.yaml
          existingSecret: psql-admin-credentials
          secretKeys:
            adminPasswordKey: postgres-password
  destination:
    server: https://kubernetes.default.svc
    namespace: psql
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions: [CreateNamespace=true]
