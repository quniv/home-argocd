---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing
  namespace: landing
  annotations:
    # CKV_K8S_40 — runAsUser > 10000: nginxinc/nginx-unprivileged fixes UID at 101
    # (enforced by the upstream image). There is no mechanism to override it without
    # rebuilding the image.
    checkov.io/skip1: CKV_K8S_40=nginx-unprivileged-uses-uid-101-fixed-by-image

    # CKV2_K8S_6 — NetworkPolicy: home-lab cluster has no NetworkPolicy enforcement
    # (Cilium is configured in allow-all mode for simplicity).
    checkov.io/skip2: CKV2_K8S_6=no-netpol-enforcement-in-home-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landing
  template:
    metadata:
      labels:
        app: landing
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: landing
          image: nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: html
          configMap:
            name: landing-html
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
