---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: monitoring
spec:
  parentRefs:
    - name: external
      namespace: infra
      sectionName: https
  hostnames: [prometheus.chillpickle.org]
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-prometheus
          port: 9090
