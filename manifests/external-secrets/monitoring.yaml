---
# Infisical paths required:
#   /monitoring/TELEGRAM_BOT_TOKEN  — bot token from @BotFather
#   /monitoring/TELEGRAM_CHAT_ID    — integer chat/group/channel ID (e.g. -1001234567890)
#
# Get your chat ID via @userinfobot or @raw_data_bot in Telegram.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: monitoring
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: alertmanager-config
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          route:
            group_by:
              - alertname
              - namespace
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            receiver: 'null'
            routes:
              - receiver: telegram
                matchers:
                  - alertname != Watchdog
                  - severity =~ "warning|critical"
                continue: false
          inhibit_rules:
            - source_matchers:
                - severity = critical
              target_matchers:
                - severity =~ "warning|info"
              equal:
                - namespace
                - alertname
            - source_matchers:
                - severity = warning
              target_matchers:
                - severity = info
              equal:
                - namespace
                - alertname
            - source_matchers:
                - alertname = InfoInhibitor
              target_matchers:
                - severity = info
              equal:
                - namespace
          receivers:
            - name: 'null'
            - name: telegram
              telegram_configs:
                - api_url: https://api.telegram.org
                  bot_token: "{{ .TELEGRAM_BOT_TOKEN }}"  # checkov:skip=CKV_SECRET_6:ESO template variable
                  chat_id: {{ .TELEGRAM_CHAT_ID }}
                  disable_notifications: false
  data:
    - secretKey: TELEGRAM_BOT_TOKEN  # checkov:skip=CKV_SECRET_6:False positive — Infisical path reference, not an encoded secret value
      remoteRef:
        key: /monitoring/TELEGRAM_BOT_TOKEN
    - secretKey: TELEGRAM_CHAT_ID  # checkov:skip=CKV_SECRET_6:False positive — Infisical path reference, not an encoded secret value
      remoteRef:
        key: /monitoring/TELEGRAM_CHAT_ID
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: admin-user  # checkov:skip=CKV_SECRET_6:False positive — this is an Infisical path reference, not an encoded secret value
      remoteRef:
        key: /monitoring/GRAFANA_ADMIN_USER
    - secretKey: admin-password  # checkov:skip=CKV_SECRET_6:False positive — this is an Infisical path reference, not an encoded secret value
      remoteRef:
        key: /monitoring/GRAFANA_ADMIN_PASSWORD
