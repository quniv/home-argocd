---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: multica
  namespace: multica
spec:
  parentRefs:
    - name: external
      namespace: infra
      sectionName: http
  hostnames: [multica.qtlab.dev, multica-api.qtlab.dev]
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: multica-frontend
  namespace: multica
spec:
  parentRefs:
    - name: external
      namespace: infra
      sectionName: https
  hostnames: [multica.qtlab.dev]
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: multica-frontend
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: multica-backend
  namespace: multica
spec:
  parentRefs:
    - name: external
      namespace: infra
      sectionName: https
  hostnames: [multica-api.qtlab.dev]
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: multica-backend
          port: 8080
