nameOverride: ""

image:
  repository: ""
  tag: "latest"
  pullPolicy: Always

replicas: 1

strategy:
  maxUnavailable: 0
  maxSurge: 1

# Optional init container for DB migrations (e.g. alembic upgrade head).
# When enabled, runs the migration command in a retry loop before the app starts.
migration:
  enabled: false
  workingDir: /app
  command: alembic upgrade head
  retries: 30
  retryDelay: 2
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

service:
  port: 80
  targetPort: 8000

probes:
  readiness:
    httpPath: /health
    port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  # Liveness uses TCP socket (not HTTP) to avoid restart storms when DB is
  # transiently unavailable — the app process stays up; only routing stops.
  liveness:
    port: 8000
    initialDelaySeconds: 15
    periodSeconds: 15
    failureThreshold: 5

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

securityContext:
  pod:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  container:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true

# envFrom: list of configMapRef or secretRef entries mounted as env vars.
envFrom: []

configmap:
  enabled: false
  data: {}

httproute:
  enabled: false
  hostname: ""
  gateway:
    name: external
    namespace: infra
    section: https

externalsecret:
  enabled: false
  refreshInterval: 1h
  store: infisical
  storeKind: ClusterSecretStore
  targetSecret: ""
  data: []

namespace: default
