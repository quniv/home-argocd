---
# kube-linter configuration for home-argocd GitOps repo (home lab).
# All checks are enabled by default; the list below explicitly ignores
# checks that are impractical or intentionally noisy for a single-node
# home-lab workload running stateful services.
checks:
  # Start from all available checks rather than the default subset.
  addAllBuiltIn: true
  exclude:
    # Stateful workloads (PostgreSQL) and sidecar containers legitimately
    # need a writable root filesystem; enforcing read-only would break them.
    - no-read-only-root-fs

    # Single-replica is intentional for a home lab; HA is out of scope.
    - minimum-three-replicas

    # Anti-affinity rules are meaningless on a 3-node hobby cluster where
    # spreading a single replica provides no real benefit.
    - no-anti-affinity

    # Alphabetical key ordering is a stylistic preference that conflicts with
    # conventional Kubernetes YAML ordering (apiVersion/kind/metadata/spec).
    # Enforcing it produces non-idiomatic YAML (e.g. data before kind).
    - sorted-keys
