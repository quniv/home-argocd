---
# Lint workflow — validates all YAML and Kubernetes manifests.
#
# Jobs:
#   yamllint        — checks syntax/style of manifests/ and apps/ against
#                     .yamllint.yml; on PRs, auto-fixes with yamlfix and
#                     commits the result back to the branch.
#   kubeconform     — validates manifests against the Kubernetes 1.28 schema;
#                     unknown CRD kinds (ArgoCD, Gateway API, ESO, Cilium) are
#                     resolved via the CRDs-catalog; anything still unknown is
#                     skipped with --ignore-missing-schemas rather than failing.
#
# bootstrap/ and charts/webapp/values/ are linted alongside manifests/ and apps/.
# charts/webapp/templates/ is excluded from yamllint (Helm Go templates are not
# valid YAML) and from kubeconform (templates are not rendered k8s manifests).
name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Deny all permissions by default; each job grants only what it needs.
permissions: read-all

jobs:
  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Fetch the actual branch ref so auto-commit can push back;
          # pull_request events check out a merge commit by default.
          ref: ${{ github.head_ref || github.ref }}

      - name: Install yamllint and yamlfix
        run: pip install yamllint yamlfix

      - name: Auto-fix YAML style issues (PRs only)
        # yamlfix applies the same rules yamllint enforces — trailing spaces,
        # indentation, missing newline at EOF. Runs before the lint check so
        # fixable issues never fail the build.
        if: github.event_name == 'pull_request'
        run: yamlfix manifests/ apps/ bootstrap/ charts/webapp/values/

      - name: Commit auto-fixed files (PRs only)
        # Stages all linted paths then commits only if yamlfix made changes.
        # Uses manual git commands to avoid glob-expansion issues with actions.
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifests/ apps/ bootstrap/ charts/webapp/values/
          git diff --staged --quiet || git commit -m "style: auto-fix YAML style issues via yamlfix"
          git push

      - name: Run yamllint
        # .yamllint.yml ignores charts/webapp/templates (Helm Go templates).
        # All other YAML in the repo is linted — manifests, apps, bootstrap,
        # and the chart values files.
        run: yamllint -c .yamllint.yml manifests/ apps/ bootstrap/ charts/

  kubeconform:
    name: Kubeconform manifest validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install kubeconform
        # Fetches the latest release binary directly from GitHub; no
        # third-party action required and no pinned version to keep stale.
        # GITHUB_TOKEN authenticates the releases API to avoid rate-limit failures.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KUBECONFORM_VERSION=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/yannh/kubeconform/releases/latest \
            | grep '"tag_name"' | sed -E 's/.*"v([^"]+)".*/\1/')
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz kubeconform
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Validate Kubernetes manifests
        # bootstrap/ is included — it contains real k8s resources.
        # charts/ is excluded — Helm templates are not rendered k8s manifests.
        # Helm values files (values.ya?ml) and JSON config files are excluded
        # because they are not k8s manifests and have no 'kind' key.
        run: |
          kubeconform \
            -ignore-missing-schemas \
            -kubernetes-version 1.36.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -ignore-filename-pattern 'values\.ya?ml$' \
            -ignore-filename-pattern '\.json$' \
            -summary \
            manifests/ apps/ bootstrap/
