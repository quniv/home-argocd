---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: psql-vvn-ce-credentials
  namespace: psql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: psql-vvn-ce-credentials
    creationPolicy: Owner
  data:
    - secretKey: DB_USER
      remoteRef:
        key: /psql/vvn-ce/DB_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /psql/vvn-ce/DB_PASSWORD
    - secretKey: DB_NAME
      remoteRef:
        key: /psql/vvn-ce/DB_NAME
